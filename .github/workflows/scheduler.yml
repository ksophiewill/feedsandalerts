name: Daily RSS Emailer

on:
  schedule:
    # Shifted to off-peak minutes to bypass GitHub's top-of-the-hour queue delays
    - cron: '53 7 * * *'   # ~ 6:53 AM EDT (Runs right before 8:00 AM)
    - cron: '47 12 * * *'   # ~ 12:47 PM EDT (Runs right before 1:00 PM)
    - cron: '38 23 * * *'    # ~ 11:38 PM EDT (Runs right before 11:45 PM)
  workflow_dispatch:

# This physically prevents GitHub from running duplicates if the server glitches
concurrency:
  group: rss-emailer
  cancel-in-progress: true

jobs:
  run-rss-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R packages and Linux System Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::pacman
            any::tidyverse
            any::magrittr
            any::tidyRSS
            any::blastula
            any::knitr
            any::DBI
            any::RSQLite
            any::glue
            
      - name: Run RSS Script
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: Rscript code/01-RSS-setup.R

      - name: Save Database & Log Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/created/feeds_database.db
          git add data/created/email_log.txt
          git commit -m "Automated update: RSS database and log" || echo "No changes to commit"
          git push
