name: Daily RSS Emailer

on:
  schedule:
    # Shifted to off-peak minutes to bypass GitHub's top-of-the-hour queue delays
    - cron: '53 10 * * *'   # ~ 6:53 AM EDT (Runs right before 7:00 AM)
    - cron: '47 16 * * *'   # ~ 12:47 PM EDT (Runs right before 1:00 PM)
    - cron: '38 3 * * *'    # ~ 11:38 PM EDT (Runs right before 11:45 PM)
  workflow_dispatch:

# This physically prevents GitHub from running duplicates if the server glitches
concurrency:
  group: rss-emailer
  cancel-in-progress: true

jobs:
  run-rss-script:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install pacman and packages
        run: |
          Rscript -e "install.packages('pacman', repos='http://cran.rstudio.com/')"
          Rscript -e "pacman::p_load(tidyverse, magrittr, tidyRSS, blastula, knitr, DBI, RSQLite, glue)"

      - name: Run RSS Script
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: Rscript code/01-RSS-setup.R

      - name: Save Database & Log Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/created/feeds_database.db
          git add data/created/email_log.txt
          git commit -m "Automated update: RSS database and log" || echo "No changes to commit"
          git push
